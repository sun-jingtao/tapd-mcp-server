name: test

# PR 用 pull_request 触发；push 只在 main 上跑，避免「PR 分支 push 同时触发 push+pull_request」的双跑。
on:
  push:
    branches: [main]
  pull_request:

# 同一分支/PR 的新提交取消仍在跑的旧任务，省 CI 资源。
concurrency:
  group: test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        # 本仓库 package.json 无 packageManager 字段，必须显式给版本，
        # 否则 action 报 "No pnpm version is specified"。10 匹配 pnpm-lock 的 lockfileVersion 9.0。
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 全量类型检查（含测试与 e2e 文件——vitest 经 esbuild 只剥类型不检查）
      - run: pnpm typecheck
      - run: pnpm build
      # 只跑 L1 + L2（单元 / 集成）。带 --coverage 才会执行 vitest.config.ts 的
      # thresholds 门禁（70/70/70/55），不达标即非零退出拦截。
      - run: pnpm test:cov
