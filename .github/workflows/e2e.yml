name: e2e

on:
  schedule:
    # 每周一次（周一 UTC 18:17 ≈ 周二北京时间 02:17）。避开整点，减少 GitHub Actions 高峰排队延迟。
    # 不用每日：TAPD OpenAPI 无删除接口，每跑一次都会在真实 workspace 永久遗留一条【回归】bug，
    # 每日 cron 一年会累积 ~365 条垃圾数据。发版前可用 workflow_dispatch 手动补跑。
    - cron: "17 18 * * 1"
  workflow_dispatch: {}

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      # 守卫：secret 缺失/被轮换为空时，describe.skipIf 会让全部用例 skip，
      # 而全 skip 的 vitest run 以 0 退出——定时任务会静默绿灯，真实回归无人察觉。
      # 定时语境下「要跑」是明确意图，缺 token 或测试项目直接 fail-fast。
      # 同时校验 workspace：缺它时测试代码不再回退到硬编码项目，会整体 skip → 这里 fail-fast 暴露配置缺失。
      - name: 校验 E2E secrets
        env:
          TAPD_TOKEN: ${{ secrets.TAPD_ACCESS_TOKEN }}
          TAPD_WORKSPACE: ${{ secrets.TAPD_TEST_WORKSPACE_ID }}
        run: |
          if [ -z "$TAPD_TOKEN" ]; then
            echo "::error::TAPD_ACCESS_TOKEN secret 未配置——E2E 将全部 skip 并静默绿灯，故直接失败。"
            exit 1
          fi
          if [ -z "$TAPD_WORKSPACE" ]; then
            echo "::error::TAPD_TEST_WORKSPACE_ID secret 未配置——E2E 会因缺测试项目而整体 skip，故直接失败。"
            exit 1
          fi
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # 无需 pnpm build：e2e 测试直接 import ../src/ 的 TS 源码，由 vitest（esbuild）转译，dist 产物无人消费。
      # E2E 打真实 TAPD，仅在每周定时 / 手动触发跑。严禁挂到 PR：真实 API 慢、脆，且会永久遗留 bug。
      - run: pnpm test:e2e
        env:
          TAPD_ACCESS_TOKEN: ${{ secrets.TAPD_ACCESS_TOKEN }}
          TAPD_E2E: "1" # 双开关之一，缺它则用例整体 skip
          TAPD_TEST_WORKSPACE_ID: ${{ secrets.TAPD_TEST_WORKSPACE_ID }}
          TAPD_TEST_OWNER_NICK: ${{ secrets.TAPD_TEST_OWNER_NICK }} # afterAll 收回处理人；缺省则跳过 owner 还原
          TAPD_TEST_ARCHIVE_STATUS: ${{ secrets.TAPD_TEST_ARCHIVE_STATUS }} # 可选，项目归档 status key，默认 resolved
